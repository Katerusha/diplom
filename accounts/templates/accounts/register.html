<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        .error { color: red; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <p>
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="error">{{ field.errors.0 }}</div>{% endif %}
                </p>
            {% endfor %}
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p style="text-align:center; margin-top:15px"><a href="{% url 'login' %}">Уже есть аккаунт? Войти</a></p>
    </div>
</body>
</html>
