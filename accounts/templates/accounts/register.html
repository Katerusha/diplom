<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | MoneyFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .register-card { width: 420px; }
    </style>
</head>
<body>
    <div class="card shadow register-card">
        <div class="card-body p-4">
            <h2 class="text-center mb-3 fw-semibold">Регистрация</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" id="{{ field.id_for_label }}"
                        class="form-control {% if field.errors %}is-invalid{% endif %}"
                        {% if field.field.required %}required{% endif %}>
                    {% if field.errors %}
                    <div class="invalid-feedback">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
            </form>
            <p class="text-center mt-3 mb-0">
                <a href="{% url 'accounts:login' %}">Уже есть аккаунт? Войти</a>
            </p>
        </div>
    </div>
</body>
</html>
