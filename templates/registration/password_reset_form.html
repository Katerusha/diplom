<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля | MoneyFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card-form { width: 400px; }
    </style>
</head>
<body>
    <div class="card shadow card-form">
        <div class="card-body p-4">
            <h2 class="text-center mb-3 fw-semibold">Сброс пароля</h2>
            <p class="text-muted small mb-3">Введите email, указанный при регистрации. Мы отправим ссылку для сброса пароля.</p>
            {% if form.errors %}
            <div class="alert alert-danger py-2 small">Проверьте правильность email.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_email" class="form-label">Email</label>
                    <input type="email" name="email" id="id_email" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary w-100">Отправить</button>
            </form>
            <p class="text-center mt-3 mb-0">
                <a href="{% url 'accounts:login' %}">Вернуться ко входу</a>
            </p>
        </div>
    </div>
</body>
</html>
